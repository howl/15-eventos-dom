<!DOCTYPE html>

  <link rel="stylesheet" href="css/main.css">
  <title>Práctica filtro</title>

<body>
  <header id="cabeceraPrincipal" class="cajaTransparente margenRelleno">
    <p>Práctica filtro</p>
  </header>
  <main class="cajaTransparente margenRelleno">
    <h1>Viajes</h1>
    <section>
      <h2>Tags</h2>
      <div id="botonesFiltrado" class="flexContainer flexCentrado">
        <!-- Tags de filtrado -->
      </div>
    </section>
    <section>
      <h2>Viajes encontrados</h2>
      <p id="infoDeFiltrado">
        Pulsa el tag por el que quieras encontrar viajes
      </p>
      <div id="viajePrincipal" class="flexContainer flexCentrado">
        <!-- Aquí el viaje principal -->
      </div>
      <h3 id="tituloViajesRelacionados" class="displayNone">Viajes relacionados</h3>
      <div id="galeriaViajesRelacionados" class="flexContainer">
        <!-- Aquí los viajes relacionados  -->
      </div>
    </section>

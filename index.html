<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/favicon/favicon.png">
  <link rel="stylesheet" href="css/main.css">
  <title>Práctica filtro</title>
</head>

<body>
  <header id="cabeceraPrincipal" class="cajaTransparente margenRelleno">
    <p>Práctica filtro</p>
  </header>
  <main class="cajaTransparente margenRelleno">
    <h1>Viajes</h1>
    <section>
      <h2>Tags</h2>
      <div id="botonesFiltrado" class="flexContainer flexCentrado">
        <!-- Tags de filtrado -->
      </div>
    </section>
    <section>
      <h2>Viajes encontrados</h2>
      <p id="infoDeUso">
        Pulsa el tag por el que quieras encontrar viajes
      </p>
      <p id="infoDeFiltrado" class="displayNone">
        Se <span class="pluralSingular"></span> encontrado <span id="numViajesFiltrados" class="negrita"></span> <span
          class="pluralSingular"></span> con el
        tag <span id="etiquetaFiltrada" class="negrita"></span>
      </p>
      <div id="galeriaViajes" class="flexContainer">
        <!-- Viaje principal: (.flexItem: flex-basis: 100%; .flexItemPrincipal: order -1) -->

        <!-- Título secudarios: h3 si hay más de un viaje (.flexItem: flex-basis: 100%;) -->

        <!-- Viajes secundarios: (.flexItem: flex-basis: 100%; .flexItemSecundario: order 1)  -->
      </div>
    </section>
  </main>
  <footer class="cajaTransparente margenRelleno">
    <p>&copy; 2026 David Santamaría Rogado. Todos los derechos reservados.<br>
      Fondo diseñado por Creative_hat.</p>
  </footer>

  <script src="js/main.js"></script>
</body>

</html>
